<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jetski Control</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
header{background:#16213e;padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #0f3460}
header h1{font-size:20px;color:#e94560}
header .status{font-size:13px;margin-left:auto}
.armed{color:#4ecca3}
.disarmed{color:#e94560}
.tabs{display:flex;background:#16213e;border-bottom:1px solid #0f3460}
.tabs button{flex:1;padding:10px;background:transparent;border:none;color:#888;font-size:14px;cursor:pointer;transition:.2s}
.tabs button.active{color:#4ecca3;border-bottom:2px solid #4ecca3;background:rgba(78,204,163,.08)}
.panel{display:none;padding:16px;max-width:600px;margin:0 auto}
.panel.active{display:block}
.card{background:#16213e;border-radius:8px;padding:16px;margin-bottom:12px}
.card h3{font-size:13px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a1a3e}
.card-row:last-child{border-bottom:none}
.card-row label{font-size:13px;color:#aaa}
.card-row .value{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums}
/* slider */
.slider-group{margin:16px 0}
.slider-group label{display:block;font-size:13px;color:#aaa;margin-bottom:6px}
.slider-group input[type=range]{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:#0f3460;border-radius:3px;outline:none}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#4ecca3;cursor:pointer}
.slider-value{text-align:center;font-size:28px;font-weight:700;color:#4ecca3;margin:8px 0}
/* buttons */
.btn-group{display:flex;gap:8px;margin:12px 0}
.btn{flex:1;padding:12px;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.btn-arm{background:#4ecca3;color:#1a1a2e}
.btn-disarm{background:#e94560;color:#fff}
.btn-save{background:#0f3460;color:#4ecca3;border:1px solid #4ecca3}
.btn:active{transform:scale(.97)}
/* grid config */
.cfg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.cfg-group label{display:block;font-size:11px;color:#888;margin-bottom:2px;text-transform:uppercase}
.cfg-group input{width:100%;padding:8px;border:1px solid #333;border-radius:4px;background:#1a1a2e;color:#e0e0e0;font-size:14px;font-family:monospace}
.cfg-group input:focus{outline:none;border-color:#4ecca3}
.cfg-section{margin-bottom:16px}
.cfg-section h4{font-size:12px;color:#4ecca3;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
/* telemetry */
.telemetry-row{display:flex;gap:8px;flex-wrap:wrap}
.telemetry-item{flex:1;min-width:80px;background:#0f3460;border-radius:6px;padding:8px;text-align:center}
.telemetry-item .label{font-size:11px;color:#888;text-transform:uppercase}
.telemetry-item .val{font-size:18px;font-weight:700;margin-top:2px}
.t-green{color:#4ecca3}
.t-red{color:#e94560}
.t-blue{color:#5390d9}
.t-yellow{color:#ffd93d}
</style>
</head>
<body>
<header>
<h1>Jetski Control</h1>
<div class="status"><span id="headerStatus" class="disarmed">DISARMED</span></div>
</header>
<div class="tabs">
<button class="active" data-tab="control">Control</button>
<button data-tab="config">Config</button>
</div>

<div id="panel-control" class="panel active">
<div class="card">
<h3>Target Height</h3>
<div class="slider-group">
<input type="range" id="heightSlider" min="0" max="50" value="0" step="1">
<div class="slider-value"><span id="heightValue">0</span> cm</div>
</div>
</div>

<div class="btn-group">
<button class="btn btn-arm" id="btnArm">ARM</button>
<button class="btn btn-disarm" id="btnDisarm">DISARM</button>
</div>

<div class="telemetry-row" id="telemRow">
<div class="telemetry-item"><div class="label">L Elevon</div><div class="val t-green" id="tElevonL">--</div></div>
<div class="telemetry-item"><div class="label">R Elevon</div><div class="val t-green" id="tElevonR">--</div></div>
</div>
</div>

<div id="panel-config" class="panel">
<div class="card">
<div class="cfg-section">
<h4>Height PID</h4>
<div class="cfg-grid">
<div class="cfg-group"><label>P</label><input type="number" id="cfg_height_kp" step="1"></div>
<div class="cfg-group"><label>I</label><input type="number" id="cfg_height_ki" step="1"></div>
<div class="cfg-group"><label>D</label><input type="number" id="cfg_height_kd" step="1"></div>
</div>
</div>
<div class="cfg-section">
<h4>Pitch PID</h4>
<div class="cfg-grid">
<div class="cfg-group"><label>P</label><input type="number" id="cfg_pitch_kp" step="1"></div>
<div class="cfg-group"><label>I</label><input type="number" id="cfg_pitch_ki" step="1"></div>
<div class="cfg-group"><label>D</label><input type="number" id="cfg_pitch_kd" step="1"></div>
</div>
</div>
<div class="cfg-section">
<h4>Roll PID</h4>
<div class="cfg-grid">
<div class="cfg-group"><label>P</label><input type="number" id="cfg_roll_kp" step="1"></div>
<div class="cfg-group"><label>I</label><input type="number" id="cfg_roll_ki" step="1"></div>
<div class="cfg-group"><label>D</label><input type="number" id="cfg_roll_kd" step="1"></div>
</div>
</div>
<div class="cfg-section">
<h4>Rudder</h4>
<div class="cfg-grid">
<div class="cfg-group"><label>Exponent ×100</label><input type="number" id="cfg_rudder_exponent_x100" step="1"></div>
<div class="cfg-group"><label>Max Roll °</label><input type="number" id="cfg_rudder_max_roll_deg" step="1"></div>
<div class="cfg-group"></div>
</div>
</div>
<div class="cfg-section">
<h4>Arming</h4>
<div class="cfg-grid">
<div class="cfg-group"><label>Arm threshold %</label><input type="number" id="cfg_arm_threshold_pct" step="1"></div>
<div class="cfg-group"><label>Disarm threshold %</label><input type="number" id="cfg_disarm_threshold_pct" step="1"></div>
<div class="cfg-group"></div>
</div>
</div>
<button class="btn btn-save" id="btnSaveConfig">Save Config</button>
<span id="saveMsg" style="font-size:13px;color:#4ecca3;margin-left:8px"></span>
</div>
</div>

<script>
const API = '';
let pollTimer = null;

function $(id) { return document.getElementById(id); }

/* Tab switching */
document.querySelectorAll('.tabs button').forEach(btn => {
btn.addEventListener('click', () => {
document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
btn.classList.add('active');
document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
});
});

/* Height slider */
$('heightSlider').addEventListener('input', () => {
$('heightValue').textContent = $('heightSlider').value;
});
$('heightSlider').addEventListener('change', () => {
fetch(API + '/api/target', {
method: 'POST',
headers: {'Content-Type':'application/json'},
body: JSON.stringify({height_cm: parseInt($('heightSlider').value)})
});
});

/* Arm/Disarm */
$('btnArm').addEventListener('click', () => {
fetch(API + '/api/arm', {method:'POST'}).then(() => pollState());
});
$('btnDisarm').addEventListener('click', () => {
fetch(API + '/api/disarm', {method:'POST'}).then(() => pollState());
});

/* Config save */
$('btnSaveConfig').addEventListener('click', () => {
const fields = [
'height_kp','height_ki','height_kd',
'pitch_kp','pitch_ki','pitch_kd',
'roll_kp','roll_ki','roll_kd',
'rudder_exponent_x100','rudder_max_roll_deg',
'arm_threshold_pct','disarm_threshold_pct'
];
const data = {};
fields.forEach(f => { data[f] = parseInt($('cfg_'+f).value) || 0; });
fetch(API + '/api/config', {
method: 'PUT',
headers: {'Content-Type':'application/json'},
body: JSON.stringify(data)
}).then(r => {
$('saveMsg').textContent = r.ok ? 'Saved!' : 'Error';
setTimeout(() => $('saveMsg').textContent = '', 2000);
});
});

/* Poll state */
function pollState() {
fetch(API + '/api/state')
.then(r => r.json())
    .then(s => {
        const armed = s.armed;
        $('headerStatus').textContent = armed ? 'ARMED' : 'DISARMED';
        $('headerStatus').className = armed ? 'armed' : 'disarmed';
        if (s.target_cm !== undefined) {
            $('heightSlider').value = s.target_cm;
            $('heightValue').textContent = s.target_cm;
        }
        if (s.elevon_left_deg !== undefined) {
            $('tElevonL').textContent = s.elevon_left_deg + '\u00b0';
            $('tElevonR').textContent = s.elevon_right_deg + '\u00b0';
        }
    });
}

/* Poll config */
function pollConfig() {
fetch(API + '/api/config')
.then(r => r.json())
.then(cfg => {
const fields = [
'height_kp','height_ki','height_kd',
'pitch_kp','pitch_ki','pitch_kd',
'roll_kp','roll_ki','roll_kd',
'rudder_exponent_x100','rudder_max_roll_deg',
'arm_threshold_pct','disarm_threshold_pct'
];
fields.forEach(f => {
const el = $('cfg_'+f);
if (el && cfg[f] !== undefined) el.value = cfg[f];
});
});
}

/* Start polling */
pollState();
pollConfig();
setInterval(pollState, 500);
setInterval(pollConfig, 5000);
</script>
</body>
</html>
